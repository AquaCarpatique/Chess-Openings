<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Opening Trainer</title>

<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.css" />

<style>
body { font-family: Inter, system-ui, Arial; background:#0f172a; color:#e6eef8; display:flex; gap:24px;
       align-items:flex-start; padding:24px; }
#boardWrap { background:#101827; padding:12px; border-radius:10px; box-shadow:0 6px 18px rgba(2,6,23,.6); }
#ui { width:420px; }
textarea { width:100%; height:120px; font-family:monospace; font-size:13px; background:#0b1220; color:#cfe9ff; border:1px solid #1f2a3b; padding:8px; border-radius:6px; }
button { background:#1f6feb; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; margin:4px 4px 4px 0; }
button.secondary { background:#2a2f3e; color:#cfe9ff; }
.small { font-size:13px; color:#b7d7ff; margin-top:8px; display:block; }
.stat { background:#071029; padding:8px; border-radius:8px; margin-top:8px; }
#status { margin-top:10px; }
.row { display:flex; gap:8px; align-items:center; }
.select { width: 100%; padding:6px; border-radius:6px; background:#0b1220; color:#cfe9ff; border:1px solid #1f2a3b; }
.info { margin-bottom:6px; }
</style>
</head>
<body>
<div id="boardWrap">
  <div id="board" style="width: 420px"></div>
</div>

<div id="ui">
<h2 style="margin:0 0 8px 0">Opening Trainer</h2>

<label class="small">Choose Opening:</label>
<select id="openingSelect" class="select">
  <option value="">-- Select Opening --</option>
</select>

<label class="small">Choose Chapter / Variation:</label>
<select id="variationSelect" class="select">
  <option value="">-- Select Variation --</option>
</select>

<label class="small">Choose Mode:</label>
<select id="modeSelect" class="select">
  <option value="normal">Normal</option>
  <option value="hard">Hard</option>
</select>

<div style="margin-top:8px;" class="row">
  <button id="loadOpeningBtn">Load Selected Opening</button>
  <button id="flipBoardBtn" class="secondary">Flip Board</button>
  <button id="hintBtn" class="secondary">Hint</button>
</div>

<label class="small" style="margin-top:8px;">Or paste PGN/SAN:</label>
<textarea id="pgn" placeholder="Paste PGN or moves here..."></textarea>

<div style="margin-top:8px;" class="row">
  <button id="startWhite" class="secondary">Start (You = White)</button>
  <button id="startBlack" class="secondary">Start (You = Black)</button>
  <button id="reset" class="secondary">Reset</button>
</div>

<div class="stat">
  <div id="info" class="info">No opening loaded.</div>
  <div id="status">Move: 0 / 0</div>
  <div id="stats">Correct: 0 &nbsp; Wrong: 0</div>
</div>

<!-- Sounds (optional) -->
<audio id="soundCapture" src="sounds/Capture.wav"></audio>
<audio id="soundCastle" src="sounds/Castle.wav"></audio>
<audio id="soundMoveSelf" src="sounds/MoveSelf.wav"></audio>
<audio id="soundOpponentMove" src="sounds/OpponentMove.wav"></audio>
<audio id="soundVariationComplete" src="sounds/Complete.mp3"></audio>
<audio id="soundWrongMove" src="sounds/Wrong.mp3"></audio>
<audio id="soundCheck" src="sounds/Check.wav"></audio>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.js"></script>

// ------------------------------
const openingSelect = document.getElementById('openingSelect');
const variationSelect = document.getElementById('variationSelect');
const modeSelect = document.getElementById('modeSelect');
const pgnTextarea = document.getElementById('pgn');
const infoEl = document.getElementById('info');
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const hintBtn = document.getElementById('hintBtn');
const loadOpeningBtn = document.getElementById('loadOpeningBtn');
const flipBoardBtn = document.getElementById('flipBoardBtn');
const toggleFreeBtn = document.getElementById('toggleFreeBtn');
const startWhiteBtn = document.getElementById('startWhite');
const startBlackBtn = document.getElementById('startBlack');
const resetBtn = document.getElementById('reset');

// ------------------------------
// Trainer state
// ------------------------------
let board = null;
let game = new Chess();
let currentLine = [];     // array of SAN moves (both sides)
let moveIndex = 0;        // next move index into currentLine
let userColor = 'w';      // 'w' or 'b'
let trainerActive = false;
let freeDrag = false;
let correctCount = 0, wrongCount = 0;

// ------------------------------
// Populate opening dropdown
// ------------------------------
function populateOpenings() {
  for (const o of Object.keys(openings)) {
    const opt = document.createElement('option');
    opt.value = o;
    opt.textContent = o;
    openingSelect.appendChild(opt);
  }
}
populateOpenings();

openingSelect.addEventListener('change', () => {
  variationSelect.innerHTML = '<option value="">-- Select Variation --</option>';
  const o = openingSelect.value;
  if (!o) return;
  // "All variations" option
  const allOpt = document.createElement('option');
  allOpt.value = '__all__';
  allOpt.textContent = 'All Variations';
  variationSelect.appendChild(allOpt);
  for (const v of Object.keys(openings[o])) {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    variationSelect.appendChild(opt);
  }
});

// ------------------------------
// Board config
// ------------------------------
function playSound(id) {
  try {
    const el = document.getElementById(id);
    if (el) { el.currentTime = 0; el.play(); }
  } catch (e) { /* ignore */ }
}

function playMoveSound(move, isPlayer) {
  if (!move || !move.flags) return;
  if (move.flags.includes('c')) playSound('soundCapture');
  else if (move.flags.includes('k') || move.flags.includes('q')) playSound('soundCastle');
  else playSound(isPlayer ? 'soundMoveSelf' : 'soundOpponentMove');

  if (game.in_check()) {
    playSound('soundCheck');
  }
}

function updateStatus() {
  statusEl.textContent = `Move: ${moveIndex} / ${currentLine.length}`;
  statsEl.textContent = `Correct: ${correctCount} \u00A0 Wrong: ${wrongCount}`;
}

function setInfo(txt) { infoEl.textContent = txt; }

// onDragStart — prevent picking up opponent piece when trainerActive & freeDrag=OFF
function onDragStart(source, piece, position, orientation) {
  if (freeDrag || !trainerActive) return true; // allow in free mode or when trainer inactive
  // only allow dragging pieces of the player's color while it's player's turn
  const turn = game.turn(); // 'w' or 'b'
  // piece is like 'wP' or 'bN'
  const pieceColor = piece.charAt(0);
  if (turn !== userColor) return false;           // not player's turn
  if (pieceColor !== userColor) return false;     // piece not owned by player
  return true;
}

// onDrop — handle a user drop
function onDrop(source, target, piece, newPos, oldPos, orientation) {
  // Free-drag or trainer inactive: just play the move if legal
  if (freeDrag || !trainerActive) {
    const mv = game.move({ from: source, to: target, promotion: 'q' });
    if (mv === null) return 'snapback';
    board.position(game.fen());
    playMoveSound(mv, true);
    updateStatus();
    return;
  }

  // Trainer active & not free-drag: enforce book move
  // Ensure it's player's turn
  if (game.turn() !== userColor) return 'snapback';

  const attempted = game.move({ from: source, to: target, promotion: 'q' });
  if (attempted === null) return 'snapback';

  const expectedSAN = currentLine[moveIndex]; // expected SAN at this index
  // Accept exact SAN match
  if (attempted.san === expectedSAN) {
    // correct
    correctCount++;
    playMoveSound(attempted, true);
    moveIndex++;
    updateStatus();

    // If more moves remain, auto-play opponent moves until it's player's turn again
    setTimeout(() => autoPlayIfNeeded(), 150);
  } else {
    // wrong: undo and snap back
  wrongCount++;
  const wrongSound = document.getElementById('soundWrongMove');
  if (wrongSound) {
  wrongSound.volume = 0.23; // adjust volume here
  wrongSound.currentTime = 0;
  wrongSound.play();
}

game.undo();
board.position(game.fen());
updateStatus();
return 'snapback';

  }
}

// onSnapEnd — make sure board shows current game position after animations
function onSnapEnd() {
  board.position(game.fen());
}

// auto-play opponent moves until it's the user's turn (or line ends)
function autoPlayIfNeeded() {
  while (moveIndex < currentLine.length) {
    const turnToMove = (moveIndex % 2 === 0) ? 'w' : 'b';
    // if it's user's turn, stop
    if (turnToMove === userColor) break;

    const expectedSAN = currentLine[moveIndex];
    // apply SAN move on the game
    const mv = game.move(expectedSAN);
    if (!mv) {
      // invalid expected move for current position — stop to avoid infinite loop
      setInfo(`Failed to play book move: ${expectedSAN}`);
      break;
    }
    board.position(game.fen(), true);
    playMoveSound(mv, false);
    moveIndex++;

    // if we finished the variation
    if (moveIndex >= currentLine.length) {
      playSound("soundVariationComplete")
      setInfo('Variation complete!');
      trainerActive = false; // mark finished
      break;
    }
  }
  updateStatus();
}

function playSoundWrapper(id) {
  try { playSound(id); } catch (e) {}
}

// ------------------------------
// Initialize Chessboard
// ------------------------------
function initBoard() {
  game = new Chess();
  const cfg = {
    draggable: true,
    position: 'start',
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd
  };
  board = Chessboard('board', cfg);
}
initBoard();

// ------------------------------
// Loading PGN from textarea
// ------------------------------
function loadPGNFromTextarea() {
  const raw = pgnTextarea.value.trim();
  if (!raw) { setInfo('Paste a PGN or SAN moves first.'); return false; }

  const tmp = new Chess();
  // try load_pgn (allows complete PGN); chess.js returns true on success
  const ok = tmp.load_pgn(raw);
  if (!ok) {
    // fallback: tokens only (SAN list)
    try {
      const tokens = raw.replace(/[0-9]+\./g,'').replace(/\s+/g,' ').trim();
      const arr = tokens.split(' ').filter(s => s.length > 0).filter(s => !['1-0','0-1','1/2-1/2'].includes(s));
      // validate by applying moves
      const tmp2 = new Chess();
      for (const m of arr) {
        const mv = tmp2.move(m);
        if (!mv) throw new Error('invalid move in SAN tokens: ' + m);
      }
      currentLine = arr.slice();
      moveIndex = 0;
      game.reset();
      board.start();
      trainerActive = true;
      setInfo(`Loaded ${currentLine.length} SAN moves (tokens).`);
      updateStatus();
      // autoplay opponent moves if needed
      setTimeout(autoPlayIfNeeded, 150);
      return true;
    } catch (e) {
      setInfo('Invalid PGN / SAN moves.');
      return false;
    }
  }

  currentLine = tmp.history();
  moveIndex = 0;
  game.reset();
  board.start();
  trainerActive = true;
  setInfo(`Loaded ${currentLine.length} moves (PGN).`);
  updateStatus();
  setTimeout(autoPlayIfNeeded, 150);
  return true;
}

// ------------------------------
// Load a selected opening / variation
// ------------------------------
loadOpeningBtn.addEventListener('click', () => {
  // pgn textarea takes priority
  if (pgnTextarea.value.trim().length > 0) {
    loadPGNFromTextarea();
    return;
  }

  const opening = openingSelect.value;
  const variation = variationSelect.value;
  const mode = modeSelect.value || 'normal';

  if (!opening || !variation) {
    setInfo('Select opening and variation (or All Variations).');
    return;
  }

  let candidates = [];
  if (variation === '__all__') {
    for (const chapter of Object.keys(openings[opening] || {})) {
      const arr = openings[opening][chapter] && openings[opening][chapter][mode];
      if (!arr) continue;
      // arr is usually an array of variations (each variation is an array of moves)
      if (Array.isArray(arr) && arr.length && Array.isArray(arr[0])) {
        candidates.push(...arr);
      } else if (Array.isArray(arr)) {
        candidates.push(arr);
      }
    }
  } else {
    const arr = openings[opening] && openings[opening][variation] && openings[opening][variation][mode];
    if (!arr) { setInfo('No variations in that mode.'); return; }
    if (Array.isArray(arr) && arr.length && Array.isArray(arr[0])) candidates = arr.slice();
    else candidates.push(arr);
  }

  if (candidates.length === 0) {
    setInfo('No variations available for this selection.');
    return;
  }

  // choose random variation from candidates
  const moves = candidates[Math.floor(Math.random() * candidates.length)];
  // moves should be an array of SAN strings
  currentLine = moves.slice();
  moveIndex = 0;
  correctCount = 0; wrongCount = 0;
  game.reset();
  board.start();
  trainerActive = true;
  setInfo(`Loaded: ${opening} — ${variation} (${mode}).`);
  updateStatus();
  // autoplay opponent if needed (if opponent to move)
  setTimeout(autoPlayIfNeeded, 150);
});

// ------------------------------
// Flip board, Hint, Toggle Free Drag
// ------------------------------
flipBoardBtn.addEventListener('click', () => board.flip());

hintBtn.addEventListener('click', () => {
  if (!trainerActive || moveIndex >= currentLine.length) { setInfo('No hint available.'); return; }
  const next = currentLine[moveIndex] || '';
  setInfo(`Hint: next move SAN = '${next}'`);
});

// ------------------------------
// Start training (set which color is user)
// ------------------------------
function startTraining(side) {
  game.reset();
  board.start();
  currentLine = currentLine || [];
  moveIndex = 0;
  correctCount = 0; wrongCount = 0;
  userColor = side === 'white' ? 'w' : 'b';
  trainerActive = true;
  setInfo(`Training started. You are ${side}.`);
  board.orientation(side === 'white' ? 'white' : 'black');
  updateStatus();
  setTimeout(autoPlayIfNeeded, 150);
}
startWhiteBtn.addEventListener('click', () => startTraining('white'));
startBlackBtn.addEventListener('click', () => startTraining('black'));

// ------------------------------
// Reset button
// ------------------------------
resetBtn.addEventListener('click', () => {
  game.reset(); board.start(); currentLine = []; moveIndex = 0; trainerActive = false;
  correctCount = 0; wrongCount = 0;
  setInfo('Reset.');
  updateStatus();
});

// ------------------------------
// Helper: load PGN on double click of textarea
// ------------------------------
pgnTextarea.addEventListener('dblclick', loadPGNFromTextarea);

// initialize UI text
setInfo('Select opening, variation (or All Variations), mode, and Load.');
updateStatus();

</script>
